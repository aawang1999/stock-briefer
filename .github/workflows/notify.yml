name: Stock Notifications

on:
  schedule:
    # Summary at 9:30 AM Pacific (16:30 UTC), Mon-Fri
    - cron: '30 16 * * 1-5'
    # Price alerts every 15 minutes during market hours
    # Market hours: 6:30 AM - 1:00 PM Pacific = 13:30 - 20:00 UTC
    - cron: '*/15 13-20 * * 1-5'

  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 16 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Send summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
        run: python notifier.py --summary

  price-alerts:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/15 13-20 * * 1-5'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Check price alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
        run: python notifier.py --alerts
